<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formation Alibaba</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: #1e293b;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header button {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }

    header h3 {
      margin: 0;
      font-size: 18px;
    }

    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: black;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .modules {
      padding: 12px;
    }

    .module {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      background: #1e293b;
      color: white;
      border-radius: 10px;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
    }

    .locked {
      background: #475569;
      opacity: 0.7;
    }

    .payment-box {
      padding: 16px;
      background: #111827;
      margin: 12px;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .payment-box p {
      margin: 8px 0;
      line-height: 1.5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
      font-size: 15px;
    }

    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: orange;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .ok {
      color: #22c55e;
      margin-top: 12px;
      font-weight: bold;
    }

    .bad {
      color: #ef4444;
      margin-top: 12px;
      font-weight: bold;
    }

    .info {
      color: #facc15;
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <header>
    <button onclick="history.back()">←</button>
    <h3>Formation AliScan</h3>
  </header>

  <!-- LECTEUR -->
  <div class="video-container">
    <iframe
      id="player"
      src="https://www.youtube.com/embed/Gx0c_lfH8L0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <!-- MODULES -->
  <div class="modules">
    <button class="module" onclick="play('Gx0c_lfH8L0')">
      🎁 Module 1 (GRATUIT)
    </button>

    <button class="module locked" onclick="checkAccess('jnrTRxrdHoE')">
      🔒 Module 2A
    </button>

    <button class="module locked" onclick="checkAccess('HO69rrkH2k4')">
      🔒 Module 2B
    </button>

    <button class="module locked" onclick="checkAccess('ycozKvER2YM')">
      🔒 Module 3
    </button>

    <button class="module locked" onclick="checkAccess('lLVx033Gado')">
      🔒 Module 4
    </button>

    <button class="module locked" onclick="checkAccess('hyb0itA-3Gc')">
      🔒 Module 5
    </button>
  </div>

  <!-- BLOC PAIEMENT -->
  <div class="payment-box">
    <p>💳 <strong>Formation complète : 2000 FCFA</strong></p>
    <p>📱 <strong>Paiement :</strong> Wave / Orange</p>
    <p><strong>+2250706273262</strong></p>

    <p>
      Après paiement, tu reçois un <strong>code d’accès</strong>.<br>
      Ce code active la formation pendant <strong>7 jours</strong>.
    </p>

    <input type="text" id="accessCode" placeholder="Entre ton code d'accès">

    <button class="btn" onclick="validateCode()">
      Activer mon accès
    </button>
   
    <button class="btn" onclick="sendWhatsApp()">
      📩 Envoyer mon ID sur WhatsApp
    </button>


    <div id="msg"></div>
  </div>

  <script>
    const activeCode = "ALI-2026"; // change ce code quand tu veux

    function play(id) {
      document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id + "?autoplay=1";
    }

    function checkAccess(id) {
      const paid = localStorage.getItem("paid");
      const expire = localStorage.getItem("expire");

      if (paid === "yes" && expire && Date.now() < Number(expire)) {
        play(id);
      } else {
        document.getElementById("msg").innerHTML =
          "<div class='bad'>🔒 Accès expiré ou non activé</div>";
        alert("🔒 Accès expiré ou non activé");
      }
    }

    function validateCode() {
      const input = document.getElementById("accessCode").value.trim();

      if (!input) {
        document.getElementById("msg").innerHTML =
          "<div class='bad'>❌ Entre ton code d'accès</div>";
        return;
      }

      if (input === activeCode) {
        const expireDate = Date.now() + (7 * 24 * 60 * 60 * 1000);

        localStorage.setItem("paid", "yes");
        localStorage.setItem("expire", expireDate);

        document.getElementById("msg").innerHTML =
          "<div class='ok'>✅ Accès activé pour 7 jours</div>";
      } else {
        document.getElementById("msg").innerHTML =
          "<div class='bad'>❌ Code incorrect</div>";
      }
    }

    (function checkExistingAccess() {
      const paid = localStorage.getItem("paid");
      const expire = localStorage.getItem("expire");

      if (paid === "yes" && expire && Date.now() < Number(expire)) {
        const daysLeft = Math.ceil((Number(expire) - Date.now()) / (24 * 60 * 60 * 1000));
        document.getElementById("msg").innerHTML =
          "<div class='info'>✅ Accès déjà actif — " + daysLeft + " jour(s) restant(s)</div>";
      }
    })();
  </script>
<!-- Commentaire -->
  <script>
    function sendWhatsApp() {
      const id = document.getElementById("accessCode").value.trim();

      if (!id) {
        alert("Entre ton ID de transaction");
        return;
      }

      const message =
        "Bonjour, j’ai payé la formation.%0AID : " + id;

      window.open(
        "https://wa.me/2250706273262?text=" + message,
        "_blank"
      );
    }
  </script>

</body>
</html>
